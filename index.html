<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osteria Nobile Menu</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#1a1a1a;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-style:italic;
    color:gold;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#222;
    border:1px solid #333;
    overflow:hidden;
    border-radius:10px;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0;
}

.price{
    color:gold;
    font-weight:bold;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    background:gold;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <div class="logo">Osteria Nobile</div>
    <div>Cart: <span id="cartCount">0</span></div>
</header>

<div class="menu-grid">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1618160702438-9b02ab6515c9?w=600" alt="">
        <div class="card-content">
            <h3>Burrata con Pomodoro</h3>
            <p>Fresh burrata, heirloom tomatoes, aged balsamic, basil oil.</p>
            <div class="price">$18</div>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1640719028782-8230c1d43428?w=600" alt="">
        <div class="card-content">
            <h3>Truffle Arancini</h3>
            <p>Black truffle risotto balls, Parmigiano fonduta.</p>
            <div class="price">$16</div>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

</div>

<script>
let cart = 0;

function addToCart(){
    cart++;
    document.getElementById("cartCount").textContent = cart;
}
</script>

</body>
</html>
